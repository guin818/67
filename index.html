<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lesson 13 단어 테스트기 (교과서 영영풀이 완벽 내장)</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif; 
            background-color: #f4f6f9; 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            box-sizing: border-box; 
        }
        .quiz-container { 
            background-color: white; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            padding: 25px 20px; 
            width: 100%; 
            max-width: 450px; 
            text-align: center; 
            box-sizing: border-box; 
        }
        .mode-container { 
            display: flex; 
            background-color: #eef2f7; 
            padding: 4px; 
            border-radius: 30px; 
            margin-bottom: 20px; 
        }
        .mode-btn { 
            flex: 1; 
            border: none; 
            background: none; 
            padding: 10px; 
            font-size: 14px; 
            font-weight: bold; 
            color: #7f8c8d; 
            cursor: pointer; 
            border-radius: 25px; 
            transition: all 0.2s;
        }
        .mode-btn.active { 
            background-color: #34495E; 
            color: white; 
        }
        .progress { 
            font-size: 15px; 
            font-weight: bold; 
            color: #888; 
            margin-bottom: 15px; 
        }
        .question-box { 
            background-color: #eef2f7; 
            padding: 25px 15px; 
            border-radius: 12px; 
            min-height: 110px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 18px; 
            color: #2c3e50; 
            line-height: 1.6; 
            word-break: keep-all;
        }
        .audio-btn { 
            background-color: #4A90E2; 
            color: white; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 25px; 
            cursor: pointer; 
            margin-top: 15px; 
            font-size: 16px; 
            font-weight: bold; 
            width: 80%; 
            transition: background 0.2s;
        }
        .audio-btn:hover {
            background-color: #357abd;
        }
        .audio-btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        .listen-count {
            font-size: 13px;
            color: #e74c3c;
            margin-top: 8px;
            font-weight: bold;
        }
        .answer-box { 
            margin: 20px 0; 
            min-height: 50px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        .answer-text { 
            font-size: 22px; 
            font-weight: bold; 
            color: #e74c3c; 
            display: none; 
            white-space: pre-line; 
        }
        .btn { 
            border: none; 
            font-weight: bold; 
            border-radius: 10px; 
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            transition: background 0.2s;
        }
        .btn-show { 
            background-color: #2ECC71; 
            color: white; 
            width: 100%; 
            margin-bottom: 15px; 
            min-height: 52px; 
            font-size: 17px; 
        }
        .btn-show:hover { background-color: #27ae60; }
        
        .score-buttons { 
            display: none; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 6px; 
            margin-bottom: 15px; 
        }
        .btn-small { 
            font-size: 11px; 
            padding: 8px 2px; 
            min-height: 36px; 
            color: white; 
        }
        .nav-buttons { 
            display: flex; 
            justify-content: space-between; 
            gap: 12px; 
        }
        .btn-nav { 
            background-color: #34495E; 
            color: white; 
            flex: 1; 
            min-height: 52px; 
            font-size: 17px; 
        }
        .btn-nav:hover { background-color: #2c3e50; }
        .btn-nav:disabled { 
            background-color: #d2d7d9; 
            color: #95a5a6; 
            cursor: not-allowed;
        }
        .result-screen { 
            display: none; 
        }
        .result-title { 
            font-size: 26px; 
            color: #2c3e50; 
            margin-bottom: 20px; 
            font-weight: bold; 
        }
        .score-text { 
            font-size: 32px; 
            color: #2c3e50; 
            font-weight: bold; 
            margin-bottom: 10px; 
            background-color: #eef2f7; 
            padding: 15px; 
            border-radius: 12px; 
        }
        .wrong-detail { 
            font-size: 16px; 
            color: #7f8c8d; 
            margin-bottom: 30px; 
        }
        .btn-restart { 
            background-color: #9b59b6; 
            color: white; 
            width: 100%; 
            min-height: 52px; 
            font-size: 17px;
        }
        .btn-restart:hover { background-color: #8e44ad; }
    </style>
</head>
<body>
<div class="quiz-container">
    <div class="mode-container">
        <button class="mode-btn active" id="modeStudent" onclick="changeMode('student')">학생용 모드</button>
        <button class="mode-btn" id="modeParent" onclick="changeMode('parent')">부모용 모드</button>
    </div>

    <div id="quiz-area">
        <div class="progress" id="progress">0 / 0</div>
        <div class="question-box" id="question">로딩 중...</div>
        
        <div>
            <button class="audio-btn" id="audioBtn" onclick="speakQuestion()">🔊 영영 뜻 듣기</button>
            <div class="listen-count" id="listenCount">남은 횟수: 2회</div>
        </div>
        
        <div class="answer-box">
            <div class="answer-text" id="answer">정답 단어 : 뜻</div>
        </div>
        
        <button class="btn btn-show" id="showAnswerBtn" onclick="showAnswer()">정답 보기</button>
        
        <div class="score-buttons" id="scoreButtons">
            <button class="btn btn-small" style="background-color: #2c3e50;" onclick="recordScore('both_ok')">둘 다 맞음</button>
            <button class="btn btn-small" style="background-color: #2980b9;" onclick="recordScore('eng_ok')">영만 맞음</button>
            <button class="btn btn-small" style="background-color: #27ae60;" onclick="recordScore('kor_ok')">한만 맞음</button>
            <button class="btn btn-small" style="background-color: #7f8c8d;" onclick="recordScore('both_no')">둘 다 틀림</button>
            <button class="btn btn-small" style="background-color: #d35400;" onclick="recordScore('kor_no')">한만 틀림</button>
            <button class="btn btn-small" style="background-color: #c0392b;" onclick="recordScore('eng_no')">영만 틀림</button>
        </div>
        
        <div class="nav-buttons">
            <button class="btn btn-nav" id="prevBtn" onclick="prevQuestion()">이전</button>
            <button class="btn btn-nav" id="nextBtn" onclick="nextQuestion()">다음</button>
        </div>
    </div>

    <div id="result-area" class="result-screen">
        <div class="result-title">💯 학습 종료</div>
        <div class="score-text" id="finalScore">총 틀린 개수: 0개</div>
        <div class="wrong-detail" id="wrongDetail">상세 결과 준비 중</div>
        <button class="btn btn-restart" onclick="restartQuiz()">다시 처음부터 하기</button>
    </div>
</div>

<script>
    // 책에 등장하는 표준 영영사전식 정의(Definition)로 완벽 업데이트!
    const originalWords = [
        { word: "civil servant", mean: "공무원", desc: "someone who works in the civil service; a person employed in the public sector on behalf of a government department" },
        { word: "whole", mean: "전체의", desc: "all of something; containing all the parts or elements; complete" },
        { word: "concentrate", mean: "집중하다", desc: "to direct all your attention, efforts, or interest towards a particular activity, subject, or problem" },
        { word: "ordinary", mean: "평범한, 일상적인", desc: "normal or average, and not special or unusual in any way" },
        { word: "briefly", mean: "잠시", desc: "for a short time; using few words; concisely" },
        { word: "properly", mean: "제대로, 정확히", desc: "correctly, or in a satisfactory way; in a suitable or right manner" },
        { word: "countable", mean: "셀 수 있는", desc: "capable of being numbered or counted; having a plural form" },
        { word: "follower", mean: "추종자, 팬", desc: "someone who supports, admires, or believes in a particular person, group, or idea" },
        { word: "bore", mean: "지루하게 만들다", desc: "to make someone feel tired or unexcited, especially by talking too much about something uninteresting" },
        { word: "personality", mean: "성격, 개성", desc: "the whole combination of qualities, beliefs, and behaviors that make a person unique" },
        { word: "absence", mean: "결석, 부재", desc: "the state of not being in a place where you are expected to be; missing" },
        { word: "warning", mean: "경고, 주의", desc: "something that tells you about a possible danger, problem, or unpleasant situation in the future" },
        { word: "improve", mean: "개선하다, 향상시키다", desc: "to make something better, or to become better than before" },
        { word: "craft", mean: "수공예", desc: "an activity involving a special skill in making things with your hands" },
        { word: "commend", mean: "칭찬하다", desc: "to formally praise someone or something, especially for an achievement or good behavior" },
        { word: "research", mean: "연구", desc: "the detailed study of a subject, especially in order to discover new information or reach a new understanding" },
        { word: "respect", mean: "존경하다", desc: "to admire someone deeply because of their abilities, qualities, achievements, or high position" },
        { word: "state (n)", mean: "상태", desc: "the physical or mental condition that a person or thing is in at a specific time" },
        { word: "state (v)", mean: "선언하다, 공표하다", desc: "to express something formally, clearly, and carefully in speech or in writing" },
        { word: "principle", mean: "원칙, 원리", desc: "a basic truth, law, or belief that is used as a base for reasoning or action" }
    ];

    let currentWords = [];
    let currentIndex = 0;
    let userAnswers = [];
    let currentMode = 'student';
    let listenCounts = [];
    let isMovingBackwards = false;

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initQuiz() {
        currentWords = shuffle([...originalWords]);
        currentIndex = 0;
        userAnswers = new Array(currentWords.length).fill(null);
        listenCounts = new Array(currentWords.length).fill(0);
    }

    function changeMode(mode) {
        currentMode = mode;
        document.getElementById('modeStudent').classList.toggle('active', mode === 'student');
        document.getElementById('modeParent').classList.toggle('active', mode === 'parent');
        updateQuiz();
    }

    function updateQuiz() {
        const current = currentWords[currentIndex];
        document.getElementById('progress').innerText = (currentIndex + 1) + " / " + currentWords.length;
        
        if (currentMode === 'student') {
            document.getElementById('question').innerHTML = '🎧 영영 뜻 소리를 듣고 어떤 단어인지 맞춰보세요!';
            document.getElementById('audioBtn').innerText = '🔊 영영 뜻 듣기';
            document.getElementById('listenCount').style.display = 'block';
            
            const remaining = Math.max(0, 2 - listenCounts[currentIndex]);
            document.getElementById('listenCount').innerText = `남은 횟수: ${remaining}회`;
            document.getElementById('audioBtn').disabled = isMovingBackwards || remaining <= 0;
        } else {
            document.getElementById('question').innerText = current.desc;
            document.getElementById('audioBtn').innerText = '🔊 단어 발음 듣기';
            document.getElementById('listenCount').style.display = 'none';
            document.getElementById('audioBtn').disabled = false;
        }
        
        document.getElementById('answer').innerText = current.word + " :\n" + current.mean;
        
        if (userAnswers[currentIndex] !== null) {
            document.getElementById('answer').style.display = 'block';
            document.getElementById('showAnswerBtn').style.display = 'none';
            document.getElementById('scoreButtons').style.display = 'grid';
        } else {
            document.getElementById('answer').style.display = 'none';
            document.getElementById('showAnswerBtn').style.display = 'flex';
            document.getElementById('scoreButtons').style.display = 'none';
        }
        
        document.getElementById('prevBtn').disabled = currentIndex === 0;
        if ('speechSynthesis' in window) { window.speechSynthesis.cancel(); }
        isMovingBackwards = false;
    }

    function speakQuestion() {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            
            let textToSpeak = "";
            
            if (currentMode === 'student') {
                listenCounts[currentIndex]++;
                const remaining = Math.max(0, 2 - listenCounts[currentIndex]);
                document.getElementById('listenCount').innerText = `남은 횟수: ${remaining}회`;
                
                if (remaining <= 0) {
                    document.getElementById('audioBtn').disabled = true;
                }
                textToSpeak = currentWords[currentIndex].desc;
            } else {
                textToSpeak = currentWords[currentIndex].word;
            }
            
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'en-US';
            utterance.rate = 0.85; 
            window.speechSynthesis.speak(utterance);
        }
    }

    function showAnswer() {
        document.getElementById('answer').style.display = 'block';
        document.getElementById('showAnswerBtn').style.display = 'none';
        document.getElementById('scoreButtons').style.display = 'grid';
    }

    function recordScore(type) {
        userAnswers[currentIndex] = type;
        if (currentIndex < currentWords.length - 1) {
            currentIndex++;
            updateQuiz();
        } else {
            showFinalResult();
        }
    }

    function showFinalResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        
        let totalWrongCount = 0;
        let halfWrong = 0;
        let fullWrong = 0;
        
        userAnswers.forEach(type => {
            if (type === 'both_no') { 
                totalWrongCount += 1.0; 
                fullWrong++; 
            } else if (['eng_ok', 'kor_ok', 'kor_no', 'eng_no'].includes(type)) { 
                totalWrongCount += 0.5; 
                halfWrong++; 
            }
        });
        
        document.getElementById('finalScore').innerText = "총 틀린 개수: " + totalWrongCount + "개";
        document.getElementById('wrongDetail').innerText = "(둘 다 틀림: " + fullWrong + "개 / 한쪽만 틀림: " + halfWrong + "개)";
    }

    function prevQuestion() {
        if (currentIndex > 0) { 
            currentIndex--; 
            isMovingBackwards = true; 
            updateQuiz(); 
        }
    }

    function nextQuestion() {
        if (currentIndex < currentWords.length - 1) { 
            currentIndex++; 
            isMovingBackwards = false; 
            updateQuiz(); 
        } else { 
            showFinalResult(); 
        }
    }

    function restartQuiz() {
        initQuiz();
        document.getElementById('quiz-area').style.display = 'block';
        document.getElementById('result-area').style.display = 'none';
        updateQuiz();
    }

    window.onload = function() { 
        initQuiz(); 
        updateQuiz(); 
    };
</script>
</body>
</html>
